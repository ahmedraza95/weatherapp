<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="https://common.olemiss.edu/_js/sweet-alert/sweet-alert.css">
    <script src="https://common.olemiss.edu/_js/sweet-alert/sweet-alert.min.js"></script>
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="dateTime"></div>
    <div class="full">
        <div id="img1">
            <img src="./imsges/img 1.jpg" width="100%" alt="">
        </div>
        <div id="img2">
            <img src="./imsges/img2.jpg" width="100%" alt="">
        </div>

        <div id="card">
            <div class="timeparent">
                <div class="date"></div>
                <div class="time"></div>
            </div>
            <form id="form" action="">
                <div class="input-group">
                    <input type="text" class="input" id="Email" name="usercity" placeholder="Enter Your city" ;>
                    <input id="value" class="button--submit" value="Check Result" type="submit">
                </div>
            </form>
            <div class="location">
                <div id="wifi-loader">
                    <svg class="circle-outer" viewBox="0 0 86 86">
                        <circle class="back" cx="43" cy="43" r="40"></circle>
                        <circle class="front" cx="43" cy="43" r="40"></circle>
                        <circle class="new" cx="43" cy="43" r="40"></circle>
                    </svg>
                    <svg class="circle-middle" viewBox="0 0 60 60">
                        <circle class="back" cx="30" cy="30" r="27"></circle>
                        <circle class="front" cx="30" cy="30" r="27"></circle>
                    </svg>
                    <svg class="circle-inner" viewBox="0 0 34 34">
                        <circle class="back" cx="17" cy="17" r="14"></circle>
                        <circle class="front" cx="17" cy="17" r="14"></circle>
                    </svg>
                    <div class="text" data-text="Searching"></div>
                </div>
            </div>

            <div class="weather"></div>

            <div class="row">
                <div class="div1">
                    <div id="div1">Type Your city</div>
                    <div class="value" id="div1value"></div>
                </div>
                <div class="div1">
                    <div id="div2">Type Your city</div>
                    <div class="value" id="div2value"></div>
                </div>
                <div class="div1">
                    <div id="div3">Type Your city</div>
                    <div class="value" id="div3value"></div>
                </div>
                <div class="div1">
                    <div id="div4">Type Your city</div>
                    <div class="value" id="div4value"></div>
                </div>
                <div class="div1">
                    <div id="div5">Type Your city</div>
                    <div class="value" id="div5value"></div>
                </div>
                <!-- <div class="div1">
                        <div id="div6"></div>
                        <div class="value" id="div6value"></div>
                    </div> -->
            </div>


        </div>
    </div>



    <script type="module" src="./app.js"></script>
</body>

</html>
